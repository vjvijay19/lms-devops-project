apiVersion: apps/v1
kind: Deployment

metadata:
  name: lms-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: lms-backend

  template:
    metadata:
      labels:
        app: lms-backend

    spec:
      containers:
      - name: lms-backend
        image: 251561352312.dkr.ecr.eu-north-1.amazonaws.com/lms-backend
        ports:
        - containerPort: 3000